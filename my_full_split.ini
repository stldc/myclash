[custom]

; ==================== 策略组（新增你要求的专用组） ====================
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 新增专用组（可自行在面板里调整节点）
custom_proxy_group=🍎 Apple 服务`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=📺 流媒体`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🤖 AI 服务`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=📱 TikTok`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=📲 Telegram`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
custom_proxy_group=🎮 游戏加速`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT

; ==================== 规则（国内外分流 + BT直连 + 新增服务） ====================
; 1. BT 全部直连（最高优先级）
ruleset=🎯 全球直连,[]GEOSITE,category-bittorrent

; 2. 局域网 + 私有 IP 直连
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

; 3. 中国大陆全直连（白名单）
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

; 4. 额外加强国内直连
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list

; 5. 你要求的分流服务（按优先级匹配）
ruleset=🍎 Apple 服务,[]GEOSITE,apple
ruleset=📺 流媒体,[]GEOSITE,netflix
ruleset=📺 流媒体,[]GEOSITE,disney
ruleset=📱 TikTok,[]GEOSITE,tiktok
ruleset=📲 Telegram,[]GEOSITE,telegram
ruleset=🤖 AI 服务,[]GEOSITE,openai          ; ChatGPT / OpenAI / 大部分 AI 服务
; Gemini / Claude 目前无独立 GEOSITE，归入 AI 服务（openai 规则已覆盖大部分域名）
; 如需更精确，可后续在 OpenClash 覆写里单独加 DOMAIN-SUFFIX,gemini.google.com 和 claude.ai

ruleset=🎮 游戏加速,[]GEOSITE,steam          ; 游戏加速主力（Steam 为主），可自行在面板加 epicgames、origin 等

; 6. 兜底规则（所有未匹配的国外流量）
ruleset=🚀 节点选择,[]MATCH

; ==================== 模板参数 ====================
enable_rule_generator=true
overwrite_original_rules=true