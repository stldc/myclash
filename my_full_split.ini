; ============================================================
; OpenClash 自定义分流模板
; 适用方式：OpenClash 直接订阅链接导入（无需 SubConverter）
; 节点显示方式：使用 `[]` 引用订阅 Provider，确保节点正确展开
;
; 分组：YouTube / X(Twitter) / Netflix / Apple / AI工具 / BT直连
; 每组含：手动选所有节点 + 自动选择（url-test）
;
; 【使用前必读】
; 将下方所有 `[]os_syouuser` 替换为你在 OpenClash 里
; 「配置订阅」中设置的订阅名称（即 Config Name）
; 例如订阅名是 "MySub"，则写成 `[]MySub`
; 如有多个订阅，每个分组里用逗号追加，例如：
; `[]Sub1`, `[]Sub2`
; ============================================================


[custom_proxy_group]

; ——————————————————————————————
; 🚀 节点选择（总入口）
; ——————————————————————————————
🚀 节点选择 = select, ♻️ 自动选择, 🎥 YouTube, 🐦 X(Twitter), 🎬 Netflix, 🍎 Apple, 🤖 AI工具, 🌍 国外网站, `[]os_syouuser`

; ——————————————————————————————
; ♻️ 全局自动选择（延迟最低）
; ——————————————————————————————
♻️ 自动选择 = url-test, `[]os_syouuser`, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

; ——————————————————————————————
; 🎥 YouTube
; ——————————————————————————————
🎥 YouTube = select, ♻️ YouTube自动, `[]os_syouuser`
♻️ YouTube自动 = url-test, `[]os_syouuser`, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

; ——————————————————————————————
; 🐦 X (Twitter)
; ——————————————————————————————
🐦 X(Twitter) = select, ♻️ X自动, `[]os_syouuser`
♻️ X自动 = url-test, `[]os_syouuser`, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

; ——————————————————————————————
; 🎬 Netflix
; ——————————————————————————————
🎬 Netflix = select, ♻️ Netflix自动, `[]os_syouuser`
♻️ Netflix自动 = url-test, `[]os_syouuser`, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

; ——————————————————————————————
; 🍎 Apple
; ——————————————————————————————
🍎 Apple = select, ♻️ Apple自动, DIRECT, `[]os_syouuser`
♻️ Apple自动 = url-test, `[]os_syouuser`, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

; ——————————————————————————————
; 🤖 AI工具（ChatGPT / Claude / Gemini / Copilot / Perplexity）
; ——————————————————————————————
🤖 AI工具 = select, ♻️ AI自动, `[]os_syouuser`
♻️ AI自动 = url-test, `[]os_syouuser`, url=http://www.gstatic.com/generate_204, interval=300, tolerance=50

; ——————————————————————————————
; 🌍 国外网站（未命中专项分组的国外流量兜底）
; ——————————————————————————————
🌍 国外网站 = select, ♻️ 自动选择, `[]os_syouuser`

; ——————————————————————————————
; 🛑 广告拦截
; ——————————————————————————————
🛑 广告拦截 = select, REJECT, DIRECT

; ——————————————————————————————
; 🐟 漏网之鱼
; ——————————————————————————————
🐟 漏网之鱼 = select, 🚀 节点选择, DIRECT


