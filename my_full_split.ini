; OpenClash 自定义分流模板
; 分组：YouTube / X(Twitter) / Netflix / Apple / AI / BT直连
; 每个分组含：手动选择所有节点 + 自动测速

[custom]

; ============================================================
; 代理组配置
; 格式：name=type, filter/url, (测速url), (interval)
; ============================================================

; 【总节点选择】手动选 或 走自动
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`.*`

; 【自动测速】从所有节点里选最快的
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; ────────────────────────────────────────────────────────────
; 各业务分组
; ────────────────────────────────────────────────────────────

; YouTube
custom_proxy_group=📺 YouTube`select`[]🚀 节点选择`[]♻️ 自动选择`[]🎬 YouTube自动`.*`DIRECT

custom_proxy_group=🎬 YouTube自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; X (Twitter)
custom_proxy_group=🐦 X(Twitter)`select`[]🚀 节点选择`[]♻️ 自动选择`[]🐦 X自动`.*`DIRECT

custom_proxy_group=🐦 X自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; Netflix
custom_proxy_group=🎥 Netflix`select`[]🚀 节点选择`[]♻️ 自动选择`[]🎥 Netflix自动`.*`DIRECT

custom_proxy_group=🎥 Netflix自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; Apple
custom_proxy_group=🍎 Apple`select`[]🚀 节点选择`[]♻️ 自动选择`[]🍎 Apple自动`.*`DIRECT

custom_proxy_group=🍎 Apple自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; AI (ChatGPT / Claude / Gemini / Copilot 等)
custom_proxy_group=🤖 AI`select`[]🚀 节点选择`[]♻️ 自动选择`[]🤖 AI自动`.*`DIRECT

custom_proxy_group=🤖 AI自动`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; BT / 下载 → 直连（不走代理）
custom_proxy_group=🔗 BT直连`select`DIRECT`[]🚀 节点选择

; 【漏网之鱼】未匹配到规则的流量
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`DIRECT

; ============================================================
; 规则集配置
; 格式：ruleset=代理组名,规则集地址
; ============================================================

; YouTube
ruleset=📺 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list

; X (Twitter)
ruleset=🐦 X(Twitter),https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Twitter.list

; Netflix
ruleset=🎥 Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list

; Apple
ruleset=🍎 Apple,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Apple.list

; AI 相关服务（OpenAI / Claude / Gemini / Copilot）
ruleset=🤖 AI,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.list
ruleset=🤖 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.list
ruleset=🤖 AI,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.list

; BT / 下载 → 直连
ruleset=🔗 BT直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Download.list

; 国内直连（私有IP / 国内域名）
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=DIRECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaIp.list

; 广告拦截
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=REJECT,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; 其余全部流量 → 漏网之鱼
ruleset=🐟 漏网之鱼,[]MATCH

; ============================================================
; Clash 配置覆盖
; ============================================================

clash_rule_base=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GeneralClashConfig.yml

; 允许局域网连接
enable_rule_generator=true
overwrite_original_rules=true
