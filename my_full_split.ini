[custom]

; ==================== 策略组（每个组都直接显示所有节点） ====================
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 手动选择
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🍎 Apple 服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=📺 流媒体`select`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=🤖 AI 服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=📱 TikTok`select`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=📲 Telegram`select`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`.*
custom_proxy_group=🎮 游戏加速`select`[]🚀 手动选择`[]♻️ 自动选择`[]DIRECT`.*

; ==================== 规则（国内外分流 + BT直连 + 正确兜底） ====================
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list

ruleset=🍎 Apple 服务,[]GEOSITE,apple
ruleset=📺 流媒体,[]GEOSITE,netflix
ruleset=📺 流媒体,[]GEOSITE,disney
ruleset=📱 TikTok,[]GEOSITE,tiktok
ruleset=📲 Telegram,[]GEOSITE,telegram
ruleset=🤖 AI 服务,[]GEOSITE,openai
ruleset=🎮 游戏加速,[]GEOSITE,steam
ruleset=🎮 游戏加速,[]GEOSITE,category-games

; BT 直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

; 兜底（关键！国外全部走代理）
ruleset=🚀 手动选择,[]MATCH

enable_rule_generator=true
overwrite_original_rules=true
